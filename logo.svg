<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Drop shadow -->
  <ellipse cx="148" cy="198" rx="72" ry="18" fill="rgba(0,0,0,0.10)"/>

  <!-- === ISOMETRIC BOX === -->
  <!-- Top face -->
  <polygon points="148,52  228,96  148,140  68,96" fill="#7EF07E"/>
  <!-- Highlight stripe on top -->
  <polygon points="148,52  175,67  148,82  121,67" fill="#A8FAA8" opacity="0.7"/>
  <polygon points="175,67  228,96  200,111  148,82" fill="#A0F0A0" opacity="0.4"/>

  <!-- Left face -->
  <polygon points="68,96  148,140  148,198  68,154" fill="#5AC85A"/>

  <!-- Right face -->
  <polygon points="228,96  148,140  148,198  228,154" fill="#48B848"/>

  <!-- Box crease lines on right face -->
  <line x1="188" y1="118" x2="188" y2="176" stroke="#3aaa3a" stroke-width="1" opacity="0.5"/>
  <line x1="208" y1="107" x2="208" y2="165" stroke="#3aaa3a" stroke-width="1" opacity="0.5"/>

  <!-- Tape on top -->
  <polygon points="140,52  156,52  156,140  140,140" fill="#66CC66" opacity="0.4"/>

  <!-- Barcode on left face (simplified) -->
  <g transform="translate(78,148)" opacity="0.5">
    <rect x="0" y="0" width="2" height="18" fill="#2a6a2a"/>
    <rect x="3" y="0" width="1" height="18" fill="#2a6a2a"/>
    <rect x="5" y="0" width="3" height="18" fill="#2a6a2a"/>
    <rect x="9" y="0" width="1" height="18" fill="#2a6a2a"/>
    <rect x="11" y="0" width="2" height="18" fill="#2a6a2a"/>
    <rect x="14" y="0" width="1" height="18" fill="#2a6a2a"/>
    <rect x="16" y="0" width="3" height="18" fill="#2a6a2a"/>
    <rect x="20" y="0" width="1" height="18" fill="#2a6a2a"/>
    <rect x="22" y="0" width="2" height="18" fill="#2a6a2a"/>
  </g>

  <!-- Cargo icons on right face -->
  <g transform="translate(162,148)" opacity="0.55" fill="none" stroke="#2a6a2a" stroke-width="1.5">
    <!-- Fragile glass icon -->
    <rect x="0" y="0" width="16" height="20" rx="1"/>
    <path d="M5,4 Q8,12 5,18" stroke-width="1"/>
    <path d="M11,4 Q8,12 11,18" stroke-width="1"/>
    <!-- Umbrella icon -->
    <rect x="20" y="0" width="16" height="20" rx="1"/>
    <path d="M28,16 L28,8 Q22,6 22,10 Q25,8 28,10 Q31,8 34,10 Q34,6 28,8" stroke-width="1.2" fill="none"/>
    <!-- Up arrow icon -->
    <rect x="40" y="0" width="16" height="20" rx="1"/>
    <line x1="48" y1="5" x2="48" y2="16"/>
    <polyline points="43,10 48,5 53,10"/>
    <line x1="44" y1="16" x2="52" y2="16"/>
  </g>

  <!-- === KARGO vertical text (right side) === -->
  <text x="248" y="82"  font-family="'Arial', sans-serif" font-size="20" font-weight="700" fill="#5AC85A" letter-spacing="2">K</text>
  <text x="248" y="106" font-family="'Arial', sans-serif" font-size="20" font-weight="700" fill="#5AC85A" letter-spacing="2">A</text>
  <text x="248" y="130" font-family="'Arial', sans-serif" font-size="20" font-weight="700" fill="#5AC85A" letter-spacing="2">R</text>
  <text x="248" y="154" font-family="'Arial', sans-serif" font-size="20" font-weight="700" fill="#5AC85A" letter-spacing="2">G</text>
  <text x="248" y="178" font-family="'Arial', sans-serif" font-size="20" font-weight="700" fill="#5AC85A" letter-spacing="2">O</text>

  <!-- === Horizontal rule above pill === -->
  <line x1="30" y1="213" x2="230" y2="213" stroke="#5AC85A" stroke-width="2.5"/>

  <!-- === ENTRIO+ pill === -->
  <rect x="18" y="220" width="264" height="62" rx="31" fill="none" stroke="#5AC85A" stroke-width="3"/>

  <!-- ENTRIO text -->
  <text x="48" y="263" font-family="'Arial', sans-serif" font-size="38" font-weight="800" fill="#5AC85A" letter-spacing="3">ENTRIO</text>

  <!-- + circle -->
  <circle cx="258" cy="251" r="22" fill="#5AC85A"/>
  <text x="258" y="260" font-family="'Arial', sans-serif" font-size="28" font-weight="700" fill="white" text-anchor="middle">+</text>
</svg>
